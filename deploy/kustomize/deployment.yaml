apiVersion: apps/v1
kind: Deployment
metadata:
  name: deploy-bot-ui
  namespace: deploy-bot
  labels:
    app: deploy-bot-ui
spec:
  # Operators ramp this from an overlay. Two replicas covers a single-zone
  # cluster; HA across zones requires PodAntiAffinity in an overlay.
  replicas: 0
  selector:
    matchLabels:
      app: deploy-bot-ui
  strategy:
    type: RollingUpdate
    rollingUpdate:
      # The SPA bundle is immutable per release; rolling one pod at a
      # time is fine and avoids any chance of two SPA versions hitting
      # the same upgrade window.
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: deploy-bot-ui
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        # nginxinc/nginx-unprivileged ships as uid 101.
        runAsUser: 101
        runAsGroup: 101
        fsGroup: 101
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: nginx
          image: ghcr.io/ezubriski/deploy-bot-ui:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            # Mounted at the standard config.d location so nginx loads
            # it on start. ConfigMap is generated from ../nginx.conf by
            # the kustomization, so editing the source file is enough —
            # no separate yaml maintenance.
            - name: nginx-conf
              mountPath: /etc/nginx/conf.d/
              readOnly: true
            # readOnlyRootFilesystem=true forces every writable path
            # nginx touches into an emptyDir. /tmp covers the upstream
            # buffer paths we configured in nginx.conf, /var/cache/nginx
            # covers proxy/fastcgi caches the base image expects, and
            # /var/run is where the unprivileged image writes pid files.
            - name: tmp
              mountPath: /tmp
            - name: nginx-cache
              mountPath: /var/cache/nginx
            - name: nginx-run
              mountPath: /var/run
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 2
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 100m
              memory: 64Mi
      volumes:
        - name: nginx-conf
          configMap:
            name: deploy-bot-ui-nginx
            items:
              - key: nginx.conf
                path: default.conf
        - name: tmp
          emptyDir:
            medium: Memory
            sizeLimit: 16Mi
        - name: nginx-cache
          emptyDir:
            sizeLimit: 32Mi
        - name: nginx-run
          emptyDir:
            medium: Memory
            sizeLimit: 1Mi
