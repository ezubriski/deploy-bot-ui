# nginx server block for the SPA. Two responsibilities:
#  1. Serve the static bundle from /usr/share/nginx/html with HTML5
#     history-mode fallback so /apps/foo-prod hits index.html instead
#     of a 404.
#  2. Reverse-proxy /v1/* to the deploy-bot api Service in-cluster so
#     the SPA only ever calls relative URLs (no CORS to configure).
#
# This file is mounted via ConfigMap in production; the copy baked into
# the image is a fallback for `docker run`.

server {
  listen       8080;
  server_name  _;

  # Container has a read-only root filesystem; nginx writes temp files,
  # caches, and the pid into emptyDir mounts. The base image already
  # points pid at /tmp/nginx.pid so we just need to keep the per-cache
  # paths inside writable mounts.
  client_body_temp_path  /tmp/client_body;
  proxy_temp_path        /tmp/proxy;
  fastcgi_temp_path      /tmp/fastcgi;
  uwsgi_temp_path        /tmp/uwsgi;
  scgi_temp_path         /tmp/scgi;

  # --- security headers ---------------------------------------------------
  # CSP keeps the SPA from loading anything we didn't intend; connect-src
  # widened by overlay if a prod CSP needs to reach a Keycloak issuer
  # that isn't on the same origin.
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options        "DENY"    always;
  add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy     "geolocation=(), microphone=(), camera=()" always;

  # --- API reverse proxy --------------------------------------------------
  # Trailing slash + path stripping rewrites /v1/foo -> /v1/foo on the
  # upstream. The Service name is overridden via configmap in overlays
  # that run the api in a different namespace.
  location /v1/ {
    proxy_pass         http://deploy-bot-api.deploy-bot.svc.cluster.local:8080;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_set_header   Authorization     $http_authorization;
    proxy_read_timeout 30s;
  }

  # --- runtime config -----------------------------------------------------
  # /tmp/config.js is rendered by /docker-entrypoint.d/40-render-runtime-config.sh
  # at pod start from OIDC_ISSUER / OIDC_CLIENT_ID env vars. Never cache it
  # — a redeploy that changes the issuer needs to take effect on the next
  # page load, not after max-age expires.
  location = /config.js {
    alias /tmp/config.js;
    default_type application/javascript;
    add_header Cache-Control "no-store" always;
  }

  # --- static SPA ---------------------------------------------------------
  location / {
    root  /usr/share/nginx/html;
    index index.html;
    # SPA history-mode fallback: any unknown path serves index.html so
    # client-side routing wins.
    try_files $uri $uri/ /index.html;
  }

  # --- assets -------------------------------------------------------------
  # Hashed filenames (Vite emits them by default) → safe to cache forever.
  location /assets/ {
    root  /usr/share/nginx/html;
    expires 1y;
    add_header Cache-Control "public, max-age=31536000, immutable";
    try_files $uri =404;
  }
}
